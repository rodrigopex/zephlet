CONFIG_ZBUS=y
CONFIG_ZEPHLETS=y
CONFIG_ZEPHLETS_COAP=y
CONFIG_NANOPB=y

CONFIG_LOG=y
CONFIG_ASSERT=y
CONFIG_TEST_RANDOM_GENERATOR=y

CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_L2_ETHERNET=y

# QEMU user-mode networking via SLIRP — no root, no TUN/TAP, works on
# macOS. `hostfwd` exposes the guest CoAP port at host UDP/5683.
CONFIG_NET_QEMU_USER=y
CONFIG_NET_QEMU_USER_EXTRA_ARGS="hostfwd=udp::5683-:5683"

# DHCP from SLIRP; the guest picks up 10.0.2.x automatically.
CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_AUTO_INIT=y
CONFIG_NET_CONFIG_NEED_IPV4=y
CONFIG_NET_DHCPV4=y

CONFIG_COAP=y
CONFIG_COAP_SERVER=y
CONFIG_COAP_URI_WILDCARD=y
