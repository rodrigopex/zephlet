CONFIG_ZBUS=y
CONFIG_ZEPHLETS=y
CONFIG_ZEPHLETS_COAP=y
CONFIG_NANOPB=y

CONFIG_ZEPHLET_TICK=y
CONFIG_ZEPHLET_UI=y

CONFIG_LOG=y
CONFIG_ASSERT=y
CONFIG_TEST_RANDOM_GENERATOR=y

# Offloaded sockets driver: the Zephyr binary forwards socket calls to
# the host BSD stack via the native simulator. The pytest fixture
# reaches the guest CoAP server at 127.0.0.1:5683 with no TAP setup,
# no root, and no host-side networking configuration. Works the same
# under bare Linux, Docker, and Colima.
CONFIG_NET_DRIVERS=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_OFFLOAD=y
CONFIG_NET_NATIVE_OFFLOADED_SOCKETS=y
CONFIG_NET_IPV6_DAD=n

CONFIG_COAP=y
CONFIG_COAP_SERVER=y
CONFIG_COAP_URI_WILDCARD=y

CONFIG_MAIN_STACK_SIZE=2048
