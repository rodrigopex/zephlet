common:
  tags: zephlet coap pytest
  harness: pytest
  timeout: 60
  platform_allow:
    - native_sim
    - native_sim/native/64
tests:
  zephlet.coap_functional.smoke:
    harness_config:
      pytest_root:
        - "pytest/test_smoke.py"
  zephlet.coap_functional.rpc:
    harness_config:
      pytest_root:
        - "pytest/test_rpc.py"
  zephlet.coap_functional.hardening:
    harness_config:
      pytest_root:
        - "pytest/test_hardening.py"
  zephlet.coap_functional.discovery:
    harness_config:
      pytest_root:
        - "pytest/test_discovery.py"
  zephlet.coap_functional.discovery_truncate:
    # Tiny discovery buffer forces the `/instances` handler over the
    # limit so the truncation case asserts 4.13.
    extra_configs:
      - CONFIG_ZEPHLETS_COAP_DISCOVERY_BUF_SIZE=16
    harness_config:
      pytest_root:
        - "pytest/test_discovery_truncate.py"
  zephlet.coap_functional.observe:
    harness_config:
      pytest_root:
        - "pytest/test_observe.py"
  zephlet.coap_functional.dtls:
    # CoAPS (DTLS-PSK) on 5684. The pytest drives libcoap's coap-client
    # (aiocoap has no PSK-DTLS binding here); CI installs libcoap3-bin.
    # Each case restarts the DUT (function-scoped) and does a DTLS
    # handshake, so it needs more than the default 60s on slow runners.
    timeout: 180
    extra_configs:
      - CONFIG_ZEPHLETS_COAP_DTLS=y
      - 'CONFIG_ZEPHLETS_COAP_DTLS_PSK_IDENTITY="Client_identity"'
      - 'CONFIG_ZEPHLETS_COAP_DTLS_PSK_KEY="0123456789"'
    harness_config:
      pytest_root:
        - "pytest/test_dtls.py"
