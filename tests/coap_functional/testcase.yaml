common:
  tags: zephlet coap pytest
  harness: pytest
  timeout: 60
  platform_allow:
    - native_sim
    - native_sim/native/64
tests:
  zephlet.coap_functional.smoke:
    harness_config:
      pytest_root:
        - "pytest/test_smoke.py"
  zephlet.coap_functional.rpc:
    harness_config:
      pytest_root:
        - "pytest/test_rpc.py"
