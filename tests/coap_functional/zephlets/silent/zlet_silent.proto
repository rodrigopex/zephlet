syntax = "proto3";

import "nanopb.proto";
import "zephlet.proto";
import "zephlet_options.proto";

option (nanopb_fileopt).long_names = false;

message Silent {
  message Config {
    uint32 nothing = 1;
  }

  message Events {
    int32 timestamp = 1;
  }
}

service SilentApi {
  /* Exposes RPCs over CoAP but is intentionally NOT discoverable:
   * `option (zephlet.coap_discoverable)` is absent, so /.well-known/core
   * never surfaces a `silent_inst` anchor. The functional test relies on
   * this asymmetry to prove the discoverable opt-in actually gates
   * emission. */
  option (zephlet.coap) = true;

  rpc start(Empty) returns (Lifecycle.Status);
  rpc stop(Empty) returns (Lifecycle.Status);
  rpc get_status(Empty) returns (Lifecycle.Status);
  /* Names are normative (base lifecycle in zephlet.proto); types are
   * per-zephlet overrides. */
  rpc config(Silent.Config) returns (Silent.Config);
  rpc get_config(Empty) returns (Silent.Config);
}
