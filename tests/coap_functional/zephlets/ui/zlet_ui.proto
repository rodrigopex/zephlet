syntax = "proto3";

import "nanopb.proto";
import "zephlet.proto";
import "zephlet_options.proto";

option (nanopb_fileopt).long_names = false;

message Ui {
  message Config {
    uint32 blink_period_ms = 1;
  }

  message Events {
    int32 timestamp = 1;
  }
}

service UiApi {
  option (zephlet.coap) = true;
  option (zephlet.coap_discoverable) = true;

  rpc start(Empty) returns (Lifecycle.Status);
  rpc stop(Empty) returns (Lifecycle.Status);
  rpc get_status(Empty) returns (Lifecycle.Status);
  /* Names are normative (base lifecycle in zephlet.proto); types are
   * per-zephlet overrides. */
  rpc config(Ui.Config) returns (Ui.Config);
  rpc get_config(Empty) returns (Ui.Config);
}
