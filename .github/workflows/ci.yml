# SPDX-License-Identifier: Apache-2.0
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ZEPHYR_SDK_VERSION: "1.0.1"

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends clang-format

      - name: clang-format --dry-run on C sources
        run: |
          files=$(git ls-files '*.c' '*.h')
          if [ -n "$files" ]; then
            echo "$files" | xargs clang-format --dry-run -Werror
          else
            echo "No C sources to check."
          fi

      - name: Byte-compile Python
        run: |
          python3 -m py_compile codegen/*.py
          python3 -m py_compile west/*.py

  build-matrix:
    name: build (${{ matrix.board }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        board: [mps2/an385, native_sim]
    env:
      ZEPHYR_SDK_INSTALL_DIR: /home/runner/zephyr-sdk-1.0.1
      ZEPHYR_EXTRA_MODULES: ${{ github.workspace }}/modules/lib/zephlet
    steps:
      - name: Checkout infra at this commit
        uses: actions/checkout@v4
        with:
          path: modules/lib/zephlet

      - name: Setup workspace
        uses: ./modules/lib/zephlet/.github/actions/setup-workspace
        with:
          sdk-version: ${{ env.ZEPHYR_SDK_VERSION }}

      - name: Build example app
        working-directory: app
        run: west build -b ${{ matrix.board }} . -- -DZEPHYR_EXTRA_MODULES=$ZEPHYR_EXTRA_MODULES

      - name: Codegen freshness check (infra sources unchanged)
        working-directory: modules/lib/zephlet
        run: |
          if ! git diff --quiet; then
            echo "FAIL: build mutated tracked files under modules/lib/zephlet/:"
            git diff --stat
            git diff
            exit 1
          fi

  twister:
    name: twister (native_sim)
    runs-on: ubuntu-latest
    needs: build-matrix
    env:
      ZEPHYR_SDK_INSTALL_DIR: /home/runner/zephyr-sdk-1.0.1
      ZEPHYR_EXTRA_MODULES: ${{ github.workspace }}/modules/lib/zephlet
    steps:
      - name: Checkout infra at this commit
        uses: actions/checkout@v4
        with:
          path: modules/lib/zephlet

      - name: Setup workspace
        uses: ./modules/lib/zephlet/.github/actions/setup-workspace
        with:
          sdk-version: ${{ env.ZEPHYR_SDK_VERSION }}

      - name: Run integration tests on native_sim
        working-directory: app
        run: west twister --testsuite-root src -p native_sim --inline-logs -O /tmp/twister-out

      - name: Install infra-test Python deps
        run: pip install aiocoap pytest-asyncio

      - name: Install libcoap client (CoAPS/DTLS tests)
        # The coap_functional.dtls sub-target drives libcoap's coap-client
        # as a subprocess; aiocoap has no PSK-DTLS binding.
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libcoap3-bin

      - name: Run infra tests on native_sim
        # `--jobs 1` serializes sub-targets so the coap_functional fixtures
        # don't race over UDP/5683 (every sub-target's DUT binds the same
        # port via COAP_SERVICE_DEFINE). A per-target port via Kconfig +
        # conftest discovery is the proper fix; this is the pragmatic
        # backstop until that lands.
        run: |
          west twister \
            --testsuite-root modules/lib/zephlet/tests \
            -p native_sim --inline-logs \
            --jobs 1 \
            -O /tmp/twister-out-infra

      - name: Upload twister artefacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: twister-out
          path: |
            /tmp/twister-out
            /tmp/twister-out-infra
          if-no-files-found: ignore

  buildhash:
    name: footprint gate (CoAP =n section hash)
    runs-on: ubuntu-latest
    env:
      ZEPHYR_SDK_INSTALL_DIR: /home/runner/zephyr-sdk-1.0.1
      ZEPHYR_EXTRA_MODULES: ${{ github.workspace }}/modules/lib/zephlet
    steps:
      - name: Checkout infra at this commit
        uses: actions/checkout@v4
        with:
          path: modules/lib/zephlet

      - name: Setup workspace
        uses: ./modules/lib/zephlet/.github/actions/setup-workspace
        with:
          sdk-version: ${{ env.ZEPHYR_SDK_VERSION }}

      - name: Build example app with CONFIG_ZEPHLETS_COAP=n
        working-directory: app
        run: >
          west build -b mps2/an385 . -d build_n --
          -DZEPHYR_EXTRA_MODULES=$ZEPHYR_EXTRA_MODULES
          -DCONFIG_ZEPHLETS_COAP=n

      - name: Assert CoAP frontend adds zero footprint when disabled
        run: modules/lib/zephlet/tests/coap_buildhash/footprint_gate.sh check app/build_n
