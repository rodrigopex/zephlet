syntax = "proto3";

import "nanopb.proto";

option (nanopb_fileopt).long_names = false;

/* Empty — sentinel for RPCs that take or return no payload. */
message Empty {}

/* Lifecycle.Status — returned by the standard start/stop/get_status RPCs. */
message Lifecycle {
  message Status {
    bool is_running = 1;
    bool is_ready = 2;
  }
}
