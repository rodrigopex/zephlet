syntax = "proto3";

import "nanopb.proto";

option (nanopb_fileopt).anonymous_oneof = true;
option (nanopb_fileopt).long_names = false;

message _ {}

message Empty {}

/* Status message for zephlet lifecycle */
message ZephletStatus {
  bool is_running = 1;
  bool is_ready = 2; /* True if zephlet initialized successfully (init returned 0) */
}

/* API call context for invoke-report correlation */
message ZephletContext {
  uint32 correlation_id = 1; /* Request correlation ID (0 = no correlation) */
  int32 return_code = 2; /* 0=success, <0=error (POSIX errno codes) */
  int32 invoke_tag = 3; /* Which invoke RPC produced this response */
}

message Invoke {
  optional ZephletContext context = 999; /* For correlation tracking */
  oneof base_invoke_tag {
    Empty start = 1;
    Empty stop = 2;
    Empty get_status = 3;
    Config config = 4;
    Empty get_config = 5;
    Empty get_last_event = 6;
  }
}

/* Each zephlet must have its specific configuration */
message Config {}

/* Each zephlet must have its specific events list. Must contain at least the timestamp */
message Events {
  int32 timestamp = 1;
}

message Report {
  optional ZephletContext context = 999; /* Present only for invoke responses */
  oneof base_report_tag {
    Empty empty = 1;
    ZephletStatus status = 2;
    Config config = 3;
    Events events = 4;
  }
}

service ZephletBase {
  rpc start(Empty) returns (ZephletStatus);
  rpc stop(Empty) returns (ZephletStatus);
  rpc get_status(Empty) returns (ZephletStatus);
  rpc config(Config) returns (Config);
  rpc get_config(Empty) returns (Config);
  rpc get_last_event(Empty) returns (Events);
}
